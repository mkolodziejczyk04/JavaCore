version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - test-network

  tests:
    image: maven:3.9-eclipse-temurin-17
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - app
    networks:
      - test-network
    command: mvn test -Dapp.url=http://app:8080

networks:
  test-network:
    driver: bridge