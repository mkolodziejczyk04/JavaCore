version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    networks:
      - test-network

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - app
    networks:
      - test-network
    command: mvn test -Dapp.url=http://app:8080

networks:
  test-network:
    driver: bridge